name: A02 Flat GSI Builder (Stable Final)

on:
  workflow_dispatch:
    inputs:
      gdrive_url:
        description: 'Masukkan Google Drive File ID atau Link UC'
        required: true
        default: '1nnqjYQ4glxDT8soNPop1vu3qBsA8tvaG'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # =========================
    # INIT
    # =========================
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          unzip tar lz4 rsync wget \
          e2fsprogs util-linux \
          android-sdk-libsparse-utils

        pip3 install gdown --break-system-packages

    # =========================
    # INSTALL LPUNPACK (FIX ERROR 127)
    # =========================
    - name: Install lpunpack
      run: |
        wget -O /usr/local/bin/lpunpack \
          https://raw.githubusercontent.com/unix3dgforce/lpunpack/master/lpunpack

        chmod +x /usr/local/bin/lpunpack

        lpunpack --help || true

    # =========================
    # DOWNLOAD ROM
    # =========================
    - name: Download ROM
      run: |
        mkdir -p rom

        echo "Using input: ${{ github.event.inputs.gdrive_url }}"

        gdown "${{ github.event.inputs.gdrive_url }}" -O rom/rom.zip

    # =========================
    # EXTRACT ROM
    # =========================
    - name: Extract ROM
      run: |
        mkdir -p rom/out
        unzip -o rom/rom.zip -d rom/out
        ls -lh rom/out

    # =========================
    # EXTRACT AP
    # =========================
    - name: Extract AP
      run: |
        mkdir -p rom/ap

        AP=$(ls rom/out/AP_*.tar.md5 | head -n 1)

        if [ -z "$AP" ]; then
          echo "AP file not found!"
          exit 1
        fi

        tar -xf "$AP" -C rom/ap
        ls -lh rom/ap

    # =========================
    # PREP SUPER
    # =========================
    - name: Prepare Super Image
      run: |
        mkdir -p rom/super

        if [ -f rom/ap/super.img.lz4 ]; then
          lz4 -d rom/ap/super.img.lz4 rom/ap/super.img
        fi

        cp rom/ap/super.img rom/super/

    # =========================
    # UNPACK SUPER
    # =========================
    - name: Unpack Partitions
      run: |
        mkdir -p rom/out_super

        lpunpack rom/super/super.img rom/out_super

        echo "=== PARTITIONS ==="
        ls -lh rom/out_super

    # =========================
    # FLATTEN SYSTEM (CORE LOGIC)
    # =========================
    - name: Build Flat System GSI
      run: |
        mkdir -p work/system mnt final

        echo "=== MOUNT SYSTEM ==="
        sudo mount -o loop rom/out_super/system.img mnt
        rsync -a mnt/ work/system/
        sudo umount mnt

        echo "=== ADD PRODUCT ==="
        if [ -f rom/out_super/product.img ]; then
          sudo mount -o loop rom/out_super/product.img mnt
          rsync -a mnt/ work/system/
          sudo umount mnt
        fi

        echo "=== ADD SYSTEM_EXT ==="
        if [ -f rom/out_super/system_ext.img ]; then
          sudo mount -o loop rom/out_super/system_ext.img mnt
          rsync -a mnt/ work/system/system_ext/
          sudo umount mnt
        fi

    # =========================
    # BUILD IMAGE
    # =========================
    - name: Create GSI Image
      run: |
        echo "=== BUILDING IMAGE ==="

        SIZE=$(du -s work/system | awk '{print $1}')
        SIZE=$((SIZE + 900000))

        dd if=/dev/zero of=gsi.img bs=1K count=$SIZE
        mkfs.ext4 -F gsi.img

        mkdir -p mnt
        sudo mount -o loop gsi.img mnt

        rsync -a work/system/ mnt/

        sync
        sudo umount mnt

        e2fsck -f gsi.img || true
        resize2fs gsi.img || true

    # =========================
    # ARTIFACT
    # =========================
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flat-gsi
        path: gsi.img

    # =========================
    # RELEASE
    # =========================
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: gsi-flat-${{ github.run_number }}
        name: "A02 FLAT GSI #${{ github.run_number }}"
        files: |
          gsi.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
