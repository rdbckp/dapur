name: CLEAN FINAL GSI CI (PERMISSION FIXED)

on:
  workflow_dispatch:
    inputs:
      gdrive_url:
        description: 'Google Drive File ID / UC Link'
        required: true
        default: '1nnqjYQ4glxDT8soNPop1vu3qBsA8tvaG'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # =========================
    # INIT SAFE ENV
    # =========================
    - name: Init Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          unzip tar lz4 wget git rsync \
          python3 python3-pip \
          e2fsprogs util-linux \
          android-sdk-libsparse-utils

        pip3 install gdown --break-system-packages

    # =========================
    # TOOL SETUP
    # =========================
    - name: Install lpunpack.py
      run: |
        mkdir -p tools

        wget -q -O tools/lpunpack.py \
          https://raw.githubusercontent.com/unix3dgforce/lpunpack/master/lpunpack.py

        chmod +x tools/lpunpack.py

    # =========================
    # DOWNLOAD ROM
    # =========================
    - name: Download ROM
      run: |
        mkdir -p rom

        gdown "${{ github.event.inputs.gdrive_url }}" -O rom/rom.zip

    # =========================
    # EXTRACT ROM
    # =========================
    - name: Extract ROM
      run: |
        mkdir -p rom/out
        unzip -o rom/rom.zip -d rom/out

    # =========================
    # FIND AP
    # =========================
    - name: Extract AP
      run: |
        mkdir -p rom/ap

        AP=$(find rom/out -name "AP_*.tar.md5" | head -n 1)

        tar -xf "$AP" -C rom/ap

    # =========================
    # PREP SUPER
    # =========================
    - name: Prepare Super
      run: |
        mkdir -p rom/super

        if [ -f rom/ap/super.img.lz4 ]; then
          lz4 -d rom/ap/super.img.lz4 rom/ap/super.img
        fi

        cp rom/ap/super.img rom/super/

    # =========================
    # UNPACK
    # =========================
    - name: Unpack Partitions
      run: |
        mkdir -p rom/out_super

        python3 tools/lpunpack.py \
          rom/super/super.img \
          rom/out_super

    # =========================
    # FLAT SYSTEM BUILD
    # =========================
    - name: Build System (FLAT)
      run: |
        mkdir -p work/system mnt

        sudo mount -o loop rom/out_super/system.img mnt
        sudo rsync -a mnt/ work/system/
        sudo umount mnt

        if [ -f rom/out_super/product.img ]; then
          sudo mount -o loop rom/out_super/product.img mnt
          sudo rsync -a mnt/ work/system/
          sudo umount mnt
        fi

        if [ -f rom/out_super/system_ext.img ]; then
          sudo mount -o loop rom/out_super/system_ext.img mnt
          sudo rsync -a mnt/ work/system/system_ext/
          sudo umount mnt
        fi

    # =========================
    # BUILD IMAGE (FIX PERMISSION ERROR)
    # =========================
    - name: Create GSI Image
      run: |
        SIZE=$(du -s work/system | awk '{print $1}')
        SIZE=$((SIZE + 1000000))

        dd if=/dev/zero of=gsi.img bs=1K count=$SIZE
        mkfs.ext4 -F gsi.img

        mkdir -p mnt

        sudo mount -o loop gsi.img mnt

        # 🔥 FIX UTAMA: SEMUA RSYNC PAKAI SUDO
        sudo rsync -a work/system/ mnt/

        sync

        sudo umount mnt

        e2fsck -f gsi.img || true
        resize2fs gsi.img || true

    # =========================
    # ARTIFACT
    # =========================
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: CLEAN-GSI-FIXED
        path: gsi.img

    # =========================
    # RELEASE
    # =========================
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: fixed-${{ github.run_number }}
        name: "CLEAN FIXED GSI #${{ github.run_number }}"
        files: |
          gsi.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
