name: GSI Baker Manual Run

on:
  workflow_dispatch:
    inputs:
      gdrive_url:
        description: 'Masukkan Link Google Drive ROM Target'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          p7zip-full aria2 squashfs-tools \
          python3-pip lz4 e2fsprogs erofs-utils \
          android-sdk-libsparse-utils
        pip3 install gdown pyelftools --break-system-packages

    - name: Download lpunpack.py
      run: |
        curl -sL "https://raw.githubusercontent.com/unix3dgforce/lpunpack/master/lpunpack.py" \
          -o /usr/local/bin/lpunpack.py
        chmod +x /usr/local/bin/lpunpack.py

    - name: Clone Erfan GSI Tools
      run: |
        git clone https://github.com/erfanoabdi/ErfanGSIs.git erfan_old
        cd erfan_old
        chmod -R +x scripts/
        sudo cp tools/brotli /usr/bin/brotli 2>/dev/null || true

        # Disable ROM_resigner (SyntaxError di Python 3)
        sed -i 's/python3 .*ROM_resigner.*/# dimatikan/g' make.sh
        sed -i 's/python .*ROM_resigner.*/# dimatikan/g' make.sh

        # FIX: mkuserimg_mke2fs.py ditulis untuk Python 2
        # Python 3: '/' = float division → mke2fs crash karena blok desimal
        # Fix: ganti '/' jadi '//' (integer division) di kalkulasi blocks
        sed -i 's|blocks = int(args.fs_size) / BLOCKSIZE|blocks = int(args.fs_size) // BLOCKSIZE|g' \
          tools/mkuserimg_mke2fs.py
        echo "=== Verify patch mkuserimg_mke2fs.py ==="
        grep "blocks = " tools/mkuserimg_mke2fs.py

    - name: Download ROM
      run: |
        mkdir -p rom_mentah
        gdown "${{ github.event.inputs.gdrive_url }}" -O rom_mentah/target_rom.zip

    - name: Ekstrak ZIP → AP tar → super.img
      run: |
        mkdir -p rom_mentah/extracted
        unzip rom_mentah/target_rom.zip -d rom_mentah/extracted/
        echo "=== Isi ZIP ==="
        ls -lh rom_mentah/extracted/

        AP_FILE=$(ls rom_mentah/extracted/AP_*.tar.md5 2>/dev/null | head -1)
        if [ -z "$AP_FILE" ]; then
          echo "ERROR: AP_*.tar.md5 tidak ditemukan!"
          exit 1
        fi
        echo "Ekstrak: $AP_FILE"
        tar -xf "$AP_FILE" -C rom_mentah/extracted/

        if [ -f rom_mentah/extracted/super.img.lz4 ]; then
          echo "Dekompresi super.img.lz4..."
          lz4 -d rom_mentah/extracted/super.img.lz4 rom_mentah/extracted/super.img
          rm rom_mentah/extracted/super.img.lz4
        fi

        if [ ! -f rom_mentah/extracted/super.img ]; then
          echo "ERROR: super.img tidak ditemukan!"
          ls -lh rom_mentah/extracted/
          exit 1
        fi
        ls -lh rom_mentah/extracted/super.img

    - name: Unpack super.img → partisi
      run: |
        mkdir -p rom_mentah/super_parts
        python3 /usr/local/bin/lpunpack.py \
          rom_mentah/extracted/super.img \
          rom_mentah/super_parts/
        echo "=== Partisi hasil unpack ==="
        ls -lh rom_mentah/super_parts/

        # Handle slot suffix _a (Samsung AB-style naming)
        for p in system product system_ext; do
          FA="rom_mentah/super_parts/${p}_a.img"
          F="rom_mentah/super_parts/${p}.img"
          if [ -f "$FA" ] && [ ! -f "$F" ]; then
            echo "Rename ${p}_a.img → ${p}.img"
            mv "$FA" "$F"
          fi
        done

    - name: Mount partisi ke folder
      run: |
        mkdir -p rom_mentah/fs/{system,product,system_ext}

        mount_img() {
          local IMG=$1
          local MNT=$2
          local NAME=$(basename "$IMG" .img)

          if [ ! -f "$IMG" ]; then
            echo "SKIP: $IMG tidak ada"
            return 0
          fi

          echo "=== Mount $NAME ==="

          # Cek sparse image (magic 0xed26ff3a little-endian)
          MAGIC=$(python3 -c "
            import struct
            with open('$IMG','rb') as f:
                b = f.read(4)
            print(hex(struct.unpack('<I',b)[0]))
            " 2>/dev/null)
          if [ "$MAGIC" = "0xed26ff3a" ]; then
            echo "  → sparse, convert ke raw..."
            simg2img "$IMG" "${IMG}.raw"
            IMG="${IMG}.raw"
          fi

          sudo mkdir -p "$MNT"

          # Coba ext4 dulu, fallback erofs
          if sudo mount -t ext4 -o loop,ro "$IMG" "$MNT" 2>/dev/null; then
            echo "  → mounted ext4 OK"
          elif sudo mount -t erofs -o loop,ro "$IMG" "$MNT" 2>/dev/null; then
            echo "  → mounted erofs OK"
          else
            echo "  → GAGAL mount $NAME"
            return 1
          fi
          echo "  → file count: $(sudo find $MNT -maxdepth 1 | wc -l)"
        }

        mount_img "rom_mentah/super_parts/system.img"     "rom_mentah/fs/system"
        mount_img "rom_mentah/super_parts/product.img"    "rom_mentah/fs/product"
        mount_img "rom_mentah/super_parts/system_ext.img" "rom_mentah/fs/system_ext"

        echo "=== Cek build.prop ==="
        sudo find rom_mentah/fs/ -name "build.prop" 2>/dev/null | head -5

    - name: Siapkan source folder untuk Erfan
      run: |
        mkdir -p rom_mentah/erfan_src

        echo "Copy system..."
        sudo cp -a rom_mentah/fs/system/. rom_mentah/erfan_src/

        if mountpoint -q rom_mentah/fs/product; then
          echo "Merge product..."
          sudo mkdir -p rom_mentah/erfan_src/product
          sudo cp -a rom_mentah/fs/product/. rom_mentah/erfan_src/product/
        fi

        if mountpoint -q rom_mentah/fs/system_ext; then
          echo "Merge system_ext..."
          sudo mkdir -p rom_mentah/erfan_src/system_ext
          sudo cp -a rom_mentah/fs/system_ext/. rom_mentah/erfan_src/system_ext/
        fi

        sudo umount rom_mentah/fs/system_ext 2>/dev/null || true
        sudo umount rom_mentah/fs/product     2>/dev/null || true
        sudo umount rom_mentah/fs/system      2>/dev/null || true

        # Cari build.prop di system langsung (bukan system_ext)
        BUILD_PROP=$(find rom_mentah/erfan_src/system -name "build.prop" 2>/dev/null | head -1)
        if [ -z "$BUILD_PROP" ]; then
          # Fallback cari di mana saja
          BUILD_PROP=$(find rom_mentah/erfan_src -name "build.prop" 2>/dev/null | \
            grep -v system_ext | head -1)
        fi
        if [ -z "$BUILD_PROP" ]; then
          echo "ERROR: build.prop tidak ditemukan!"
          find rom_mentah/erfan_src/ -maxdepth 3 | head -40
          exit 1
        fi

        echo "=== build.prop: $BUILD_PROP ==="
        grep -E "ro.treble|ro.build.version|ro.product.device" "$BUILD_PROP" || true

        # Inject treble
        sudo sed -i '/ro.treble.enabled/d' "$BUILD_PROP"
        echo "ro.treble.enabled=true" | sudo tee -a "$BUILD_PROP" > /dev/null
        echo "→ ro.treble.enabled=true diinjek ke $BUILD_PROP"

        SIZE_KB=$(du -sk rom_mentah/erfan_src | awk '{print $1}')
        echo "=== Ukuran erfan_src: ${SIZE_KB} KB ==="
        if [ "$SIZE_KB" -lt 100 ]; then
          echo "ERROR: erfan_src terlalu kecil, kemungkinan copy gagal!"
          exit 1
        fi

        echo "=== Struktur erfan_src (level 2) ==="
        find rom_mentah/erfan_src -maxdepth 2 -type d | head -30

    - name: Masak GSI dengan Erfan
      run: |
        cd erfan_old
        sudo bash make.sh ../rom_mentah/erfan_src/ Generic Aonly
        sudo chmod -R 777 out/

        echo "=== Output GSI ==="
        ls -lh out/ || true

        # Validasi output
        IMG=$(ls out/*.img 2>/dev/null | head -1)
        if [ -z "$IMG" ]; then
          echo "ERROR: Tidak ada .img di out/"
          cat tmp/mkimage.log 2>/dev/null || true
          exit 1
        fi
        SIZE=$(stat -c%s "$IMG")
        echo "Output: $IMG ($SIZE bytes)"
        if [ "$SIZE" -lt 1048576 ]; then
          echo "ERROR: img terlalu kecil ($SIZE bytes)!"
          cat tmp/mkimage.log 2>/dev/null || true
          exit 1
        fi
        echo "BUILD SUKSES ✓"

    - name: Upload ke GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: erfan_old/out/*.img
        tag_name: GSI-${{ github.run_number }}
        name: GSI Build #${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
