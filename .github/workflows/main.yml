name: Samsung GSI Builder Full Auto

on:
  workflow_dispatch:
    inputs:
      gdrive_url:
        description: 'Masukkan Link Google Drive ROM Target'
        required: true
        default: 'https://drive.google.com/file/d/1nnqjYQ4glxDT8soNPop1vu3qBsA8tvaG/view?usp=drive_link'

permissions:
  contents: write

jobs:
  build-gsi:
    runs-on: ubuntu-latest

    steps:
    # =========================
    # INIT
    # =========================
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          aria2 p7zip-full unzip tar \
          lz4 e2fsprogs squashfs-tools \
          python3-pip git \
          android-sdk-libsparse-utils \
          erofs-utils fuse2fs

        pip3 install gdown --break-system-packages

    # =========================
    # DOWNLOAD ROM
    # =========================
    - name: Download ROM
      run: |
        mkdir -p rom/input
        gdown "${{ github.event.inputs.gdrive_url }}" -O rom/input/rom.zip

    # =========================
    # EXTRACT ZIP
    # =========================
    - name: Extract ROM ZIP
      run: |
        mkdir -p rom/extracted
        unzip -o rom/input/rom.zip -d rom/extracted
        ls -lh rom/extracted

    # =========================
    # EXTRACT AP TAR
    # =========================
    - name: Extract AP Firmware
      run: |
        mkdir -p rom/ap
        AP_FILE=$(ls rom/extracted/AP_*.tar.md5 | head -n 1)

        if [ -z "$AP_FILE" ]; then
          echo "AP file not found!"
          exit 1
        fi

        tar -xf "$AP_FILE" -C rom/ap
        ls -lh rom/ap

    # =========================
    # HANDLE SUPER.IMG
    # =========================
    - name: Prepare Super Image
      run: |
        mkdir -p rom/super

        if [ -f rom/ap/super.img.lz4 ]; then
          echo "Decompressing LZ4..."
          lz4 -d rom/ap/super.img.lz4 rom/ap/super.img
        fi

        if [ ! -f rom/ap/super.img ]; then
          echo "super.img not found!"
          ls -lh rom/ap
          exit 1
        fi

        cp rom/ap/super.img rom/super/

    # =========================
    # UNPACK SUPER
    # =========================
    - name: Unpack Super Image
      run: |
        mkdir -p rom/super_out
        lpunpack rom/super/super.img rom/super_out

        echo "=== PARTITIONS ==="
        ls -lh rom/super_out

    # =========================
    # BUILD GSI (CORE STAGE)
    # =========================
    - name: Build GSI Image
      run: |
        mkdir -p output

        echo "=== Using system.img as base GSI ==="

        if [ ! -f rom/super_out/system.img ]; then
          echo "system.img not found!"
          ls -lh rom/super_out
          exit 1
        fi

        # COPY BASE SYSTEM
        cp rom/super_out/system.img output/gsi.img

        # OPTIONAL: resize / cleanup
        e2fsck -f output/gsi.img || true
        resize2fs output/gsi.img || true

        echo "GSI READY"

    # =========================
    # ARTIFACT UPLOAD
    # =========================
    - name: Upload GSI Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gsi-image
        path: output/gsi.img

    # =========================
    # RELEASE
    # =========================
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: gsi-${{ github.run_number }}
        name: "Samsung GSI Build #${{ github.run_number }}"
        files: |
          output/gsi.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
