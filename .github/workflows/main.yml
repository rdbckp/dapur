name: A02 Flat System GSI Builder

on:
  workflow_dispatch:
    inputs:
      gdrive_url:
        description: 'Masukkan Link Google Drive ROM Target'
        required: true
        default: 'https://drive.google.com/file/d/1nnqjYQ4glxDT8soNPop1vu3qBsA8tvaG/view?usp=drive_link'



permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          unzip tar lz4 \
          e2fsprogs rsync \
          android-sdk-libsparse-utils \
          util-linux

        pip3 install gdown --break-system-packages

    # =====================
    # DOWNLOAD
    # =====================
    - name: Download ROM
      run: |
        mkdir -p rom
        gdown "${{ github.event.inputs.gdrive_url }}" -O rom/rom.zip

    # =====================
    # EXTRACT
    # =====================
    - name: Extract ROM
      run: |
        mkdir -p rom/out
        unzip -o rom/rom.zip -d rom/out

    # =====================
    # EXTRACT AP
    # =====================
    - name: Extract AP
      run: |
        mkdir -p rom/ap
        AP=$(ls rom/out/AP_*.tar.md5 | head -n 1)
        tar -xf "$AP" -C rom/ap

    # =====================
    # HANDLE SYSTEM BASE
    # =====================
    - name: Prepare Base System
      run: |
        mkdir -p work/system mnt

        if [ -f rom/ap/super.img.lz4 ]; then
          lz4 -d rom/ap/super.img.lz4 rom/ap/super.img
        fi

        cp rom/ap/super.img rom/

        lpunpack rom/super.img rom/out_super

        sudo mount -o loop rom/out_super/system.img mnt
        rsync -a mnt/ work/system/
        sudo umount mnt

    # =====================
    # FLATTEN PRODUCT + SYSTEM_EXT
    # =====================
    - name: Merge Product + SystemExt
      run: |
        echo "=== FLATTEN INTO SYSTEM ==="

        # product
        if [ -d rom/out_super/product.img ]; then
          mkdir -p mnt
          sudo mount -o loop rom/out_super/product.img mnt
          rsync -a mnt/ work/system/
          sudo umount mnt
        fi

        # system_ext
        if [ -d rom/out_super/system_ext.img ]; then
          mkdir -p mnt
          sudo mount -o loop rom/out_super/system_ext.img mnt
          rsync -a mnt/ work/system/system_ext/
          sudo umount mnt
        fi

    # =====================
    # BUILD NEW SYSTEM IMAGE
    # =====================
    - name: Build System Image (FLAT GSI)
      run: |
        echo "=== BUILDING FLAT SYSTEM IMAGE ==="

        SIZE=$(du -s work/system | awk '{print $1}')
        SIZE=$((SIZE + 800000))

        dd if=/dev/zero of=gsi.img bs=1K count=$SIZE
        mkfs.ext4 -F gsi.img

        mkdir -p mnt
        sudo mount -o loop gsi.img mnt

        rsync -a work/system/ mnt/

        sync
        sudo umount mnt

        e2fsck -f gsi.img || true
        resize2fs gsi.img || true

    # =====================
    # RELEASE
    # =====================
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flat-gsi
        path: gsi.img

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: flat-${{ github.run_number }}
        name: "FLAT A02 GSI #${{ github.run_number }}"
        files: |
          gsi.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
